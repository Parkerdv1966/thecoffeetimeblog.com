# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json
# ----------------------------------------------------------------------
# Sveltia CMS configuration for the coffee time blog
# ----------------------------------------------------------------------
#
# AUTHENTICATION
# This config uses GitHub backend with Personal Access Token (PAT) auth
# by default. No OAuth proxy required.
#
# When you visit /admin, click the small arrow next to the "Sign In"
# button and choose "Sign In with Token". Sveltia provides a link to
# GitHub that pre-selects the right scopes.
#
# To use the regular OAuth "Sign In with GitHub" button instead, deploy
# the sveltia-cms-auth Worker (https://github.com/sveltia/sveltia-cms-auth)
# and uncomment the `base_url` line below.
# ----------------------------------------------------------------------

backend:
  name: github
  repo: Parkerdv1966/thecoffeetimeblog.com
  branch: main
  # base_url: https://your-sveltia-cms-auth.workers.dev   # uncomment if using OAuth Worker

site_url: https://thecoffeetimeblog.com
display_url: https://thecoffeetimeblog.com
logo_url: /favicon.svg

media_folder: public/images
public_folder: /images

slug:
  encoding: ascii
  clean_accents: true

collections:
  # --------------------------------------------------------------------
  # Travel map settings (singleton — controls the world map on /travels)
  # --------------------------------------------------------------------
  - name: settings
    label: Site settings
    files:
      - label: Travel map
        name: map-settings
        file: src/data/map-settings.json
        format: json
        fields:
          - label: Map image
            name: mapImage
            widget: image
            default: /images/world-map.png
            hint: "World map background. Must be 2:1 equirectangular for markers to land in geographically correct spots."
          - label: Height mode
            name: heightMode
            widget: select
            options: [natural, shorter, shortest]
            default: natural
            hint: "natural = 2:1 (full image, default), shorter = 5:2 (trims poles), shortest = 3:1 (trims more)"
          - label: Focal point
            name: focalPoint
            widget: select
            options: [center, top, bottom]
            default: center
            hint: "Which part of the image to keep visible when 'Height mode' is not 'natural'"
          - label: Past trip marker size
            name: pastMarkerSize
            widget: select
            options: [small, medium, large]
            default: medium
          - label: Upcoming trip marker size
            name: upcomingMarkerSize
            widget: select
            options: [small, medium, large]
            default: medium
          - label: Show parchment frame
            name: showFrame
            widget: boolean
            default: true
            hint: "Border and parchment background around the map"

  # --------------------------------------------------------------------
  # Journal entries
  # --------------------------------------------------------------------
  - name: entries
    label: Journal entries
    label_singular: Journal entry
    folder: src/content/entries
    create: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    summary: "{{title}} — {{location}} ({{publishDate | date('YYYY-MM-DD')}})"
    sortable_fields: [publishDate, title, location]
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: dek, widget: string, required: false, hint: "One-line summary, italicized in the layout" }
      - label: Date
        name: publishDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - { label: Location, name: location, widget: string, hint: "City name, e.g. Lisbon — must match a trip's location to link them" }
      - label: Mode
        name: mode
        widget: select
        options: [writing, travels, café, essay]
        default: writing
      - label: Hero palette
        name: heroPalette
        widget: select
        options: [terracotta, sage, ocean, gold, espresso]
        default: terracotta
        hint: "Used when no hero image is uploaded"
      - { label: Hero image, name: heroImage, widget: image, required: false, hint: "Optional — overrides palette block" }
      - { label: Hero alt text, name: heroAlt, widget: string, required: false }
      - label: Hero position
        name: heroPosition
        widget: select
        options: [center, top, bottom, left, right]
        default: center
        hint: "Which part of the image to keep when cropped. Use 'top' for sky/skyline photos."
      - label: Photos (1–3)
        name: photos
        widget: list
        required: false
        max: 3
        summary: "{{fields.image}}"
        field: { label: Image, name: image, widget: image }
        hint: "Optional gallery shown after the body. 1 photo = full width, 2 = side by side, 3 = triptych."
      - label: Photo alt text (1–3)
        name: photoAlts
        widget: list
        required: false
        max: 3
        field: { label: Alt text, name: alt, widget: string }
        hint: "Optional — one alt text per photo above, in the same order"
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  # --------------------------------------------------------------------
  # Trips
  # --------------------------------------------------------------------
  - name: trips
    label: Trips
    label_singular: Trip
    folder: src/content/trips
    create: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    summary: "{{title}} ({{status}})"
    sortable_fields: [startDate, title, location]
    fields:
      - { label: Title, name: title, widget: string, hint: "e.g. Lisbon, October 2026" }
      - { label: City / location, name: location, widget: string, hint: "Match this to entry locations to link related journal entries" }
      - { label: Country, name: country, widget: string }
      - label: Coordinates
        name: coordinates
        widget: object
        summary: "{{lat}}, {{lng}}"
        fields:
          - { label: Latitude, name: lat, widget: number, value_type: float, min: -90, max: 90, hint: "e.g. 38.7223 (positive = North)" }
          - { label: Longitude, name: lng, widget: number, value_type: float, min: -180, max: 180, hint: "e.g. -9.1393 (negative = West)" }
      - label: Start date
        name: startDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
      - label: End date
        name: endDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
      - label: Status
        name: status
        widget: select
        options: [past, upcoming]
        default: past
      - label: Cover palette
        name: coverPalette
        widget: select
        options: [terracotta, sage, ocean, gold, espresso]
        default: terracotta
      - { label: Cover image, name: coverImage, widget: image, required: false, hint: "Shown on the trip page hero and as the hover preview on the map" }
      - label: Cover position
        name: coverPosition
        widget: select
        options: [center, top, bottom, left, right]
        default: center
      - label: Photos
        name: photos
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
        hint: "Gallery on the trip's detail page"
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Body, name: body, widget: markdown }

  # --------------------------------------------------------------------
  # Works
  # --------------------------------------------------------------------
  - name: works
    label: Works
    label_singular: Work
    folder: src/content/works
    create: true
    slug: "{{slug}}"
    extension: md
    format: yaml-frontmatter
    summary: "{{title}} — {{kind}} ({{status}})"
    sortable_fields: [order, title, status, finishedDate]
    fields:
      - { label: Title, name: title, widget: string }
      - label: Kind
        name: kind
        widget: select
        options: ["short story", novella, novel, "essay collection", poem, "poetry collection"]
      - label: Status
        name: status
        widget: select
        options: [idea, gathering, "first draft", "in progress", editing, finished]
      - label: Started date
        name: startedDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
      - label: Finished date
        name: finishedDate
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "YYYY-MM-DD"
        time_format: false
        required: false
      - { label: Excerpt, name: excerpt, widget: text, required: false }
      - { label: Note, name: note, widget: text }
      - { label: Cover image, name: coverImage, widget: image, required: false }
      - label: Cover palette
        name: coverPalette
        widget: select
        options: [terracotta, sage, ocean, gold, espresso]
        default: espresso
      - { label: Display order, name: order, widget: number, value_type: int, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - label: Body
        name: body
        widget: markdown
        required: false
